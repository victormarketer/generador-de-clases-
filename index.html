<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Generador de Clases para Células</title>

<style>
  :root{
    --bg:#0f172a;
    --card: rgba(255,255,255,.06);
    --border: rgba(255,255,255,.12);
    --text: rgba(255,255,255,.92);
    --muted: rgba(255,255,255,.72);
    --green:#22c55e;
    --green2:#16a34a;
  }

  body{
    margin:0;
    font-family:Arial, sans-serif;
    background: radial-gradient(1200px 600px at 50% -150px, rgba(34,197,94,.25), transparent 60%),
                linear-gradient(180deg, #0b1224, var(--bg));
    color:var(--text);
    padding:24px 14px;
    text-align:center;
  }

  .wrap{
    max-width: 980px;
    margin: 0 auto;
  }

  h1{
    margin: 18px 0 10px;
    font-size: clamp(24px, 3.6vw, 40px);
    letter-spacing:.2px;
  }

  p.lead{
    margin: 0 0 18px;
    color: var(--muted);
    font-size: clamp(14px, 2.1vw, 16px);
  }

  .panel{
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 18px;
    box-shadow: 0 20px 60px rgba(0,0,0,.35);
  }

  /* Login box */
  .loginBox{
    max-width: 520px;
    margin: 18px auto 0;
  }

  .row{
    display:flex;
    gap:10px;
    flex-wrap:wrap;
    align-items:center;
    justify-content:center;
    margin-top: 12px;
  }

  input{
    width: min(520px, 100%);
    padding: 14px 14px;
    border-radius: 12px;
    border: 1px solid rgba(255,255,255,.16);
    background: rgba(0,0,0,.18);
    color: var(--text);
    outline:none;
    font-size: 16px;
  }

  input::placeholder{ color: rgba(255,255,255,.5); }

  button{
    padding: 12px 18px;
    background: var(--green);
    border: none;
    color: white;
    font-size: 16px;
    cursor: pointer;
    border-radius: 12px;
    margin: 6px;
    font-weight: 700;
  }
  button:hover{ background: var(--green2); }
  button.secondary{
    background: rgba(255,255,255,.10);
    border: 1px solid rgba(255,255,255,.16);
  }
  button.secondary:hover{
    background: rgba(255,255,255,.14);
  }

  textarea{
    width: 100%;
    min-height: clamp(260px, 42vh, 620px);
    margin-top: 14px;
    padding: 14px;
    border-radius: 14px;
    border: 1px solid rgba(255,255,255,.14);
    background: rgba(0,0,0,.18);
    color: var(--text);
    font-size: 14px;
    line-height: 1.55;
  }

  .actions{
    display:flex;
    gap:10px;
    flex-wrap:wrap;
    justify-content:center;
    margin-top: 10px;
  }

  .topbar{
    display:flex;
    justify-content: space-between;
    align-items:center;
    gap:10px;
    margin-bottom: 10px;
    color: var(--muted);
    font-size: 13px;
  }

  .badge{
    display:inline-flex;
    align-items:center;
    gap:8px;
    padding: 6px 10px;
    border-radius: 999px;
    background: rgba(34,197,94,.12);
    border: 1px solid rgba(34,197,94,.25);
    color: rgba(255,255,255,.9);
  }

  .hidden{ display:none !important; }
</style>
</head>

<body>
  <div class="wrap">
    <h1>Generador de Clases para Células</h1>
    <p class="lead">Escribe el tema y la IA creará una clase completa</p>

    <!-- LOGIN -->
    <div id="loginView" class="panel loginBox">
      <div class="topbar">
        <span class="badge">🔒 Acceso privado</span>
        <span id="loginStatus"></span>
      </div>

      <p style="margin:8px 0 12px; color: var(--muted);">
        Ingresá la contraseña para acceder al generador.
      </p>

      <input id="password" type="password" placeholder="Contraseña de acceso" />
      <div class="row">
        <button onclick="login()">Ingresar</button>
      </div>
      <p id="loginMsg" style="margin:10px 0 0; color: rgba(255,255,255,.75); font-size:13px;"></p>
    </div>

    <!-- APP -->
    <div id="appView" class="panel hidden" style="margin-top:18px;">
      <div class="topbar">
        <span class="badge">✅ Acceso concedido</span>
        <button class="secondary" onclick="logout()">Salir</button>
      </div>

      <input id="tema" placeholder="Ej: Restauración familiar" />
      <div class="actions">
        <button onclick="generar()">Generar Clase</button>
        <button class="secondary" onclick="descargarTXT()">Descargar TXT</button>
        <button class="secondary" onclick="descargarPDF()">Descargar PDF</button>
      </div>

      <textarea id="resultado" placeholder="Aquí aparecerá la clase..."></textarea>
    </div>
  </div>

<script>
async function checkAuth() {
  const loginStatus = document.getElementById("loginStatus");
  loginStatus.textContent = "Verificando…";

  try {
    const r = await fetch("/api/me", { method: "GET" });
    if (r.ok) {
      showApp();
      return true;
    }
  } catch (e) {}

  loginStatus.textContent = "";
  showLogin();
  return false;
}

function showApp(){
  document.getElementById("loginView").classList.add("hidden");
  document.getElementById("appView").classList.remove("hidden");
}
function showLogin(){
  document.getElementById("appView").classList.add("hidden");
  document.getElementById("loginView").classList.remove("hidden");
}

async function login(){
  const pass = document.getElementById("password").value;
  const msg = document.getElementById("loginMsg");
  msg.textContent = "Ingresando…";

  try {
    const r = await fetch("/api/login", {
      method: "POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify({ password: pass })
    });

    const data = await r.json().catch(() => ({}));

    if (!r.ok) {
      msg.textContent = data.error || "No se pudo ingresar.";
      return;
    }

    msg.textContent = "Listo ✅";
    showApp();
    document.getElementById("password").value = "";
  } catch (e) {
    msg.textContent = "Error de conexión: " + e.message;
  }
}

async function logout(){
  await fetch("/api/logout", { method: "POST" }).catch(() => {});
  showLogin();
}

async function generar() {
  const tema = document.getElementById("tema").value.trim();
  const resultado = document.getElementById("resultado");

  if (!tema) {
    resultado.value = "Escribe un tema primero.";
    return;
  }

  const prompt = `
Crea una clase para una célula cristiana.

Tema: ${tema}

Estructura:
1) Introducción
2) Desarrollo bíblico
3) Aplicación práctica
4) Preguntas para el grupo
5) Oración final
`;

  resultado.value = "Generando...";

  try {
    const respuesta = await fetch("/api/generate", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ prompt })
    });

    const data = await respuesta.json().catch(() => ({}));

    if (!respuesta.ok) {
      resultado.value =
        "ERROR: " + (data.error || "No se pudo generar") + "\n\n" +
        "DETALLES:\n" + JSON.stringify(data.details || data, null, 2);
      return;
    }

    resultado.value = data.text || "No llegó texto desde Gemini.";
  } catch (e) {
    resultado.value = "Error de conexión: " + e.message;
  }
}

function descargarTXT() {
  const contenido = document.getElementById("resultado").value || "";
  if (!contenido.trim()) {
    alert("Primero genera una clase para poder descargarla.");
    return;
  }

  const blob = new Blob([contenido], { type: "text/plain;charset=utf-8" });
  const url = URL.createObjectURL(blob);

  const a = document.createElement("a");
  a.href = url;
  a.download = "clase-celula.txt";
  document.body.appendChild(a);
  a.click();
  a.remove();

  URL.revokeObjectURL(url);
}

function descargarPDF() {
  const contenido = document.getElementById("resultado").value || "";
  if (!contenido.trim()) {
    alert("Primero genera una clase para poder descargarla.");
    return;
  }

  const win = window.open("", "_blank");
  const safe = escapeHtml(contenido).replace(/\n/g, "<br>");

  win.document.open();
  win.document.write(`
    <!DOCTYPE html>
    <html lang="es">
    <head>
      <meta charset="UTF-8">
      <title>Clase para Célula</title>
      <style>
        body{ font-family: Arial, sans-serif; padding: 24px; line-height: 1.55; font-size: 14px; }
        h1{ margin-top: 0; }
      </style>
    </head>
    <body>
      <h1>Clase para Célula</h1>
      <div>${safe}</div>
      <script>
        window.onload = () => window.print();
      <\/script>
    </body>
    </html>
  `);
  win.document.close();
}

function escapeHtml(str) {
  return str
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#039;");
}

checkAuth();
</script>

</body>
</html>
