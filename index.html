<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Generador de Recursos Bíblicos</title>

<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#0f172a">
<link rel="apple-touch-icon" href="/icons/icon-192.png">

<style>
  :root{
    --bg:#0b1220;
    --bg2:#0f172a;
    --card:rgba(255,255,255,.06);
    --border:rgba(255,255,255,.12);
    --text:#ffffff;
    --muted:rgba(255,255,255,.75);
    --accent:#22c55e;
    --accent2:#16a34a;
    --danger:#ef4444;
  }

  *{ box-sizing:border-box; }

  body{
    margin:0;
    font-family: Arial, sans-serif;
    background:
      radial-gradient(1200px 600px at 50% -150px, rgba(34,197,94,.20), transparent 60%),
      radial-gradient(900px 400px at 20% 0%, rgba(59,130,246,.12), transparent 50%),
      linear-gradient(180deg, var(--bg), var(--bg2));
    color: var(--text);
    padding: 24px 14px;
    text-align:center;
  }

  .wrap{
    width:min(1100px, 100%);
    margin:0 auto;
  }

  h1{
    margin:12px 0 8px;
    font-size: clamp(24px, 5vw, 42px);
    letter-spacing:.2px;
  }

  .lead{
    margin:0 0 18px;
    color:var(--muted);
    font-size: clamp(14px, 2.2vw, 17px);
  }

  .panel{
    background: linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.03));
    border:1px solid var(--border);
    border-radius:18px;
    box-shadow: 0 20px 60px rgba(0,0,0,.35);
    padding:18px;
    margin-top:16px;
  }

  .loginBox{
    max-width: 540px;
    margin: 0 auto;
  }

  .topbar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:10px;
    margin-bottom:12px;
    flex-wrap:wrap;
  }

  .badge{
    display:inline-flex;
    align-items:center;
    gap:8px;
    padding:7px 12px;
    border-radius:999px;
    background:rgba(34,197,94,.14);
    border:1px solid rgba(34,197,94,.28);
    font-size:12px;
    font-weight:700;
  }

  .status{
    color:var(--muted);
    font-size:12px;
  }

  .field{
    width:100%;
    text-align:left;
  }

  label{
    display:block;
    margin:0 0 6px;
    color:var(--muted);
    font-size:13px;
  }

  input, select, textarea{
    width:100%;
    border-radius:12px;
    border:1px solid rgba(255,255,255,.14);
    background: rgba(0,0,0,.18);
    color:var(--text);
    outline:none;
    font-size:16px;
  }

  input, select{
    padding:14px;
  }

  textarea{
    padding:16px;
    min-height: 320px;
    line-height:1.55;
    font-size:14px;
    resize:vertical;
  }

  input::placeholder,
  textarea::placeholder{
    color:rgba(255,255,255,.5);
  }

  .controls{
    display:grid;
    grid-template-columns: 1.2fr .8fr .8fr;
    gap:12px;
    margin-bottom:12px;
  }

  .controls-2{
    display:grid;
    grid-template-columns: 1fr 1fr;
    gap:12px;
    margin-bottom:12px;
  }

  .controls-3{
    display:grid;
    grid-template-columns: 1fr 1fr;
    gap:12px;
    margin-bottom:12px;
  }

  @media (max-width: 860px){
    .controls,
    .controls-2,
    .controls-3{
      grid-template-columns: 1fr;
    }
  }

  button{
    padding:13px 18px;
    border:none;
    border-radius:12px;
    font-size:15px;
    font-weight:700;
    cursor:pointer;
    margin:6px;
  }

  .btn-primary{
    background:var(--accent);
    color:white;
  }

  .btn-primary:hover{
    background:var(--accent2);
  }

  .btn-secondary{
    background: rgba(255,255,255,.08);
    color:white;
    border:1px solid rgba(255,255,255,.12);
  }

  .btn-danger{
    background: rgba(239,68,68,.12);
    color:#fecaca;
    border:1px solid rgba(239,68,68,.3);
  }

  .actions{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:8px;
    margin-top:12px;
  }

  .quick-types{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:10px;
    margin-bottom:16px;
  }

  .quick-type{
    padding:10px 14px;
    border-radius:999px;
    border:1px solid rgba(255,255,255,.12);
    background:rgba(255,255,255,.06);
    color:white;
    font-size:13px;
    font-weight:700;
    cursor:pointer;
  }

  .quick-type.active{
    background:rgba(34,197,94,.16);
    border-color:rgba(34,197,94,.35);
  }

  .tabs{
    display:flex;
    justify-content:center;
    gap:10px;
    flex-wrap:wrap;
    margin-bottom:14px;
  }

  .tab{
    padding:10px 14px;
    border-radius:999px;
    border:1px solid rgba(255,255,255,.12);
    background:rgba(255,255,255,.06);
    color:white;
    font-size:13px;
    font-weight:700;
    cursor:pointer;
  }

  .tab.active{
    background:rgba(34,197,94,.16);
    border-color:rgba(34,197,94,.35);
  }

  .hidden{
    display:none !important;
  }

  .card{
    width:100%;
    min-height: clamp(280px, 46vh, 700px);
    background: linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.03));
    border: 1px solid rgba(255,255,255,.12);
    border-radius: 14px;
    padding: 18px;
    overflow: auto;
    font-size: 14px;
    text-align:left;
  }

  .card h2{
    margin: 18px 0 10px;
    font-size: 22px;
    border-left: 4px solid rgba(34,197,94,.75);
    padding-left: 10px;
  }

  .card h3{
    margin: 16px 0 8px;
    font-size: 17px;
    color: rgba(255,255,255,.97);
  }

  .card p{
    margin: 8px 0;
    color: rgba(255,255,255,.88);
    line-height: 1.7;
    font-size: 14px;
  }

  .card hr{
    border:none;
    border-top:1px solid rgba(255,255,255,.12);
    margin:14px 0;
  }

  .card ul, .card ol{
    margin: 8px 0 12px 22px;
    padding:0;
    color: rgba(255,255,255,.88);
    line-height:1.7;
    font-size:14px;
  }

  .card li{
    margin:6px 0;
    font-size:14px;
  }

  .section-box{
    margin: 14px 0;
    padding: 14px;
    border: 1px solid rgba(255,255,255,.10);
    border-radius: 14px;
    background: rgba(255,255,255,.03);
  }

  .highlight-box{
    margin: 14px 0;
    padding: 14px;
    border-left: 4px solid rgba(34,197,94,.75);
    border-radius: 12px;
    background: rgba(34,197,94,.08);
  }

  .series-day{
    margin: 18px 0;
    padding: 16px;
    border: 1px solid rgba(255,255,255,.10);
    border-radius: 16px;
    background: rgba(255,255,255,.03);
  }

  .small{
    color:var(--muted);
    font-size:12px;
    margin-top:8px;
  }

  .json-label{
    display:inline-block;
    margin-bottom:8px;
    font-size:12px;
    color:var(--muted);
  }
</style>
</head>

<body>
  <div class="wrap">
    <h1>Generador de Recursos Bíblicos</h1>
    <p class="lead">Prepara clases, sermones, devocionales y estudios bíblicos con una presentación más profesional y compártelos fácilmente.</p>

    <div id="loginView" class="panel loginBox">
      <div class="topbar">
        <span class="badge">🔒 Acceso privado</span>
        <span id="loginStatus" class="status"></span>
      </div>

      <div class="field">
        <label for="password">Contraseña</label>
        <input id="password" type="password" placeholder="Contraseña de acceso">
      </div>

      <div class="actions">
        <button class="btn-primary" onclick="login()">Ingresar</button>
      </div>

      <p id="loginMsg" class="small"></p>
    </div>

    <div id="appView" class="panel hidden">
      <div class="topbar">
        <span class="badge">✅ Acceso concedido</span>
        <button class="btn-secondary" onclick="logout()">Salir</button>
      </div>

      <div class="actions">
        <button id="installBtn" class="btn-primary hidden" onclick="instalarApp()">Instalar app</button>
      </div>

      <div class="quick-types">
        <button id="quick-celula" class="quick-type active" type="button" onclick="seleccionarTipoContenido('celula')">📖 Clase para célula</button>
        <button id="quick-sermon" class="quick-type" type="button" onclick="seleccionarTipoContenido('sermon')">🎤 Sermón</button>
        <button id="quick-devocional" class="quick-type" type="button" onclick="seleccionarTipoContenido('devocional')">🙏 Devocional</button>
        <button id="quick-estudio" class="quick-type" type="button" onclick="seleccionarTipoContenido('estudio')">📚 Estudio bíblico</button>
      </div>

      <div class="controls">
        <div class="field">
          <label for="tema">Tema</label>
          <input id="tema" placeholder="Ej: La gracia de Dios">
        </div>

        <div class="field">
          <label for="tipoContenido">Tipo de contenido</label>
          <select id="tipoContenido" onchange="actualizarQuickButtons(); actualizarContextoLabel(); actualizarCantidadSerie();">
            <option value="celula">Clase para célula</option>
            <option value="sermon">Sermón</option>
            <option value="devocional">Devocional</option>
            <option value="estudio">Estudio bíblico</option>
          </select>
        </div>

        <div class="field">
          <label for="tono">Tono</label>
          <select id="tono">
            <option value="pastoral">Pastoral</option>
            <option value="bíblico">Bíblico</option>
            <option value="práctico">Práctico</option>
            <option value="profundo">Profundo</option>
            <option value="evangelístico">Evangelístico</option>
          </select>
        </div>
      </div>

      <div class="controls-2">
        <div class="field">
          <label id="labelContexto" for="contexto">Tipo o público</label>
          <select id="contexto">
            <option value="general">General</option>
            <option value="mujeres">Mujeres</option>
            <option value="hombres">Hombres</option>
            <option value="jóvenes">Jóvenes</option>
            <option value="matrimonios">Matrimonios</option>
            <option value="liderazgo">Liderazgo</option>
            <option value="discipulado">Discipulado</option>
            <option value="evangelístico">Evangelístico</option>
          </select>
        </div>

        <div class="field">
          <label for="textoBase">Texto bíblico base</label>
          <input id="textoBase" placeholder="Ej: Efesios 2:8-10">
        </div>
      </div>

      <div class="controls-3">
        <div class="field">
          <label for="modoGeneracion">Modo de generación</label>
          <select id="modoGeneracion" onchange="actualizarCantidadSerie(); actualizarLabelCantidadSerie();">
            <option value="unico">Contenido único</option>
            <option value="serie">Serie completa</option>
          </select>
        </div>

        <div class="field" id="cantidadSerieWrap">
          <label id="labelCantidadSerie" for="cantidadSerie">Cantidad de la serie</label>
          <select id="cantidadSerie">
            <option value="4">4 partes</option>
            <option value="7">7 partes</option>
          </select>
        </div>
      </div>

      <div class="actions">
        <button class="btn-primary" onclick="generar()">Generar contenido</button>
      </div>

      <div class="tabs">
        <button id="tabPremium" class="tab active" onclick="setTab('premium')">Vista premium</button>
        <button id="tabTexto" class="tab" onclick="setTab('texto')">Texto / JSON</button>
      </div>

      <div id="vista" class="card"></div>
      <textarea id="resultado" class="hidden"></textarea>

      <div class="actions">
        <button class="btn-secondary" onclick="copiar()">Copiar</button>
        <button class="btn-secondary" onclick="descargarTXT()">Descargar TXT</button>
        <button class="btn-secondary" onclick="exportarWord()">Exportar a Word</button>
        <button class="btn-secondary" onclick="compartirContenido()">Compartir</button>
        <button class="btn-secondary" onclick="enviarWhatsApp()">WhatsApp</button>
        <button class="btn-secondary" onclick="nuevaClase()">Nuevo contenido</button>
        <button class="btn-danger" onclick="limpiar()">Limpiar</button>
      </div>

      <p id="estado" class="small"></p>
    </div>
  </div>

<script>
  let deferredPrompt = null;

  function setTab(tab){
    const vista = document.getElementById("vista");
    const resultado = document.getElementById("resultado");
    const tPremium = document.getElementById("tabPremium");
    const tTexto = document.getElementById("tabTexto");

    if(tab === "premium"){
      vista.classList.remove("hidden");
      resultado.classList.add("hidden");
      tPremium.classList.add("active");
      tTexto.classList.remove("active");
    } else {
      vista.classList.add("hidden");
      resultado.classList.remove("hidden");
      tPremium.classList.remove("active");
      tTexto.classList.add("active");
    }
  }

  async function checkAuth() {
    try {
      const r = await fetch("/api/me");
      if (r.ok) {
        showApp();
        return;
      }
    } catch (e) {}
    showLogin();
  }

  function showApp(){
    document.getElementById("loginView").classList.add("hidden");
    document.getElementById("appView").classList.remove("hidden");
  }

  function showLogin(){
    document.getElementById("appView").classList.add("hidden");
    document.getElementById("loginView").classList.remove("hidden");
  }

  async function login(){
    const password = document.getElementById("password").value;
    const msg = document.getElementById("loginMsg");
    const status = document.getElementById("loginStatus");
    msg.textContent = "Ingresando...";
    status.textContent = "";

    try {
      const r = await fetch("/api/login", {
        method:"POST",
        headers:{ "Content-Type":"application/json" },
        body: JSON.stringify({ password })
      });

      const data = await r.json().catch(()=>({}));

      if(!r.ok){
        msg.textContent = data.error || "No se pudo ingresar.";
        return;
      }

      msg.textContent = "";
      status.textContent = "Acceso concedido";
      showApp();
      document.getElementById("password").value = "";
    } catch (e){
      msg.textContent = "Error de conexión: " + e.message;
    }
  }

  async function logout(){
    await fetch("/api/logout", { method:"POST" }).catch(()=>{});
    showLogin();
  }

  function seleccionarTipoContenido(tipo){
    document.getElementById("tipoContenido").value = tipo;
    actualizarQuickButtons();
    actualizarContextoLabel();
    actualizarCantidadSerie();
  }

  function actualizarQuickButtons(){
    const tipo = document.getElementById("tipoContenido").value;
    const ids = ["celula", "sermon", "devocional", "estudio"];

    ids.forEach(id => {
      const btn = document.getElementById("quick-" + id);
      if(btn){
        btn.classList.toggle("active", id === tipo);
      }
    });
  }

  function actualizarContextoLabel(){
    const tipo = document.getElementById("tipoContenido").value;
    const label = document.getElementById("labelContexto");

    if(tipo === "celula"){
      label.textContent = "Tipo o público de la célula";
    } else if(tipo === "sermon"){
      label.textContent = "Contexto o público del sermón";
    } else if(tipo === "devocional"){
      label.textContent = "Contexto o público del devocional";
    } else if(tipo === "estudio"){
      label.textContent = "Contexto o público del estudio";
    } else {
      label.textContent = "Tipo o público";
    }
  }

  function actualizarLabelCantidadSerie(){
    const tipo = document.getElementById("tipoContenido").value;
    const modo = document.getElementById("modoGeneracion").value;
    const label = document.getElementById("labelCantidadSerie");
    const wrap = document.getElementById("cantidadSerieWrap");

    if(modo !== "serie"){
      wrap.classList.add("hidden");
      return;
    }

    wrap.classList.remove("hidden");

    if(tipo === "devocional"){
      label.textContent = "Cantidad de días";
    } else if(tipo === "estudio"){
      label.textContent = "Cantidad de semanas";
    } else {
      label.textContent = "Cantidad de la serie";
    }
  }

  function actualizarCantidadSerie(){
    const tipo = document.getElementById("tipoContenido").value;
    const modo = document.getElementById("modoGeneracion").value;
    const cantidad = document.getElementById("cantidadSerie");

    if(modo !== "serie"){
      actualizarLabelCantidadSerie();
      return;
    }

    if(tipo === "devocional"){
      cantidad.value = "7";
    } else {
      cantidad.value = "4";
    }

    actualizarLabelCantidadSerie();
  }

  function getNombreContenido(tipo){
    if(tipo === "celula") return "Clase para célula";
    if(tipo === "sermon") return "Sermón";
    if(tipo === "devocional") return "Devocional";
    if(tipo === "estudio") return "Estudio bíblico";
    return "Contenido bíblico";
  }

  function getNombreModo(modo){
    return modo === "serie" ? "serie" : "contenido";
  }

  async function compartirContenido() {
    const texto = document.getElementById("resultado").value || "";
    const tema = document.getElementById("tema").value || "Contenido bíblico";

    if (!texto.trim()) {
      alert("Primero genera un contenido.");
      return;
    }

    if (navigator.share) {
      try {
        await navigator.share({
          title: tema,
          text: texto
        });
      } catch (e) {
        console.log("Compartir cancelado o no disponible");
      }
    } else {
      alert("Tu dispositivo no permite compartir desde aquí.");
    }
  }

  function nuevaClase() {
    document.getElementById("tema").value = "";
    document.getElementById("textoBase").value = "";
    document.getElementById("resultado").value = "";
    document.getElementById("vista").innerHTML = "";
    document.getElementById("estado").textContent = "";
    document.getElementById("tipoContenido").value = "celula";
    document.getElementById("contexto").value = "general";
    document.getElementById("tono").value = "pastoral";
    document.getElementById("modoGeneracion").value = "unico";
    document.getElementById("cantidadSerie").value = "4";
    actualizarQuickButtons();
    actualizarContextoLabel();
    actualizarCantidadSerie();
    setTab("premium");
    window.scrollTo({ top: 0, behavior: "smooth" });
  }

  async function generar() {
    const tema = document.getElementById("tema").value.trim();
    const tipoContenido = document.getElementById("tipoContenido").value;
    const contexto = document.getElementById("contexto").value;
    const tono = document.getElementById("tono").value;
    const textoBase = document.getElementById("textoBase").value.trim();
    const modoGeneracion = document.getElementById("modoGeneracion").value;
    const cantidadSerie = document.getElementById("cantidadSerie").value;

    const resultado = document.getElementById("resultado");
    const vista = document.getElementById("vista");
    const estado = document.getElementById("estado");

    if (!tema) {
      resultado.value = "Escribe un tema primero.";
      vista.innerHTML = "<p><strong>Escribe un tema primero.</strong></p>";
      return;
    }

    const nombreContenido = getNombreContenido(tipoContenido);
    const nombreModo = getNombreModo(modoGeneracion);

    resultado.value = "Generando...";
    vista.innerHTML = `<p><strong>Generando ${escapeHtml(nombreModo)}...</strong></p>`;
    estado.textContent = modoGeneracion === "serie"
      ? `Generando serie de ${nombreContenido.toLowerCase()}...`
      : `Generando ${nombreContenido.toLowerCase()}...`;

    try {
      const respuesta = await fetch("/api/generate", {
        method:"POST",
        headers:{ "Content-Type":"application/json" },
        body: JSON.stringify({
          tema,
          tipoContenido,
          contexto,
          tono,
          textoBase,
          modoGeneracion,
          cantidadSerie
        })
      });

      const data = await respuesta.json().catch(() => ({}));

      if (!respuesta.ok) {
        const errorTexto =
          "ERROR: " + (data.error || "No se pudo generar") + "\n\n" +
          "DETALLES:\n" + JSON.stringify(data.details || data, null, 2);

        resultado.value = errorTexto;
        vista.innerHTML = "<p><strong>No se pudo generar el contenido.</strong></p><pre style='white-space:pre-wrap'>" + escapeHtml(errorTexto) + "</pre>";
        estado.textContent = "Ocurrió un error.";
        return;
      }

      if (data.mode === "json" && data.data) {
        vista.innerHTML = renderJsonContent(data.data);
        resultado.value = jsonToPlainText(data.data);
      } else {
        const texto = data.text || "No llegó texto desde Gemini.";
        resultado.value = texto;
        vista.innerHTML = renderPremium(texto);
      }

      estado.textContent = modoGeneracion === "serie"
        ? `Serie generada correctamente ✅`
        : `${nombreContenido} generado correctamente ✅`;

      setTab("premium");
    } catch (e) {
      resultado.value = "Error de conexión: " + e.message;
      vista.innerHTML = "<p><strong>Error de conexión:</strong> " + escapeHtml(e.message) + "</p>";
      estado.textContent = "Error de conexión.";
    }
  }

  function renderJsonContent(data){
    if (!data || typeof data !== "object") {
      return "<p>No se pudo renderizar el contenido.</p>";
    }

    if (data.tipo === "devocional") return renderDevocional(data);
    if (data.tipo === "serie_devocional") return renderSerieDevocional(data);
    if (data.tipo === "clase") return renderClase(data);
    if (data.tipo === "serie_clase") return renderSerieClase(data);
    if (data.tipo === "sermon") return renderSermon(data);
    if (data.tipo === "serie_sermon") return renderSerieSermon(data);
    if (data.tipo === "estudio") return renderEstudio(data);
    if (data.tipo === "serie_estudio") return renderSerieEstudio(data);

    return `
      <span class="json-label">JSON renderizado</span>
      <pre style="white-space:pre-wrap;">${escapeHtml(JSON.stringify(data, null, 2))}</pre>
    `;
  }

  function renderDevocional(data){
    return `
      <div class="highlight-box">
        <h2>${escapeHtml(data.titulo || "")}</h2>
        <p><strong>Texto bíblico clave:</strong> ${escapeHtml(formatReference(data.texto_biblico_clave || ""))}</p>
        <p><strong>Verdad central:</strong> ${escapeHtml(data.verdad_central || "")}</p>
      </div>

      <div class="section-box">
        <h3>Reflexión devocional</h3>
        <p>${nl2br(data.reflexion_devocional || "")}</p>
      </div>

      <div class="section-box">
        <h3>Aplicación personal</h3>
        ${renderList(data.aplicacion_personal)}
      </div>

      <div class="section-box">

  function plainTextToHtml(raw){
    const text = escapeHtml(raw || "");
    const lines = text.split("\n");

    let html = "";
    let inList = false;

    function closeList() {
      if (inList) {
        html += "</ol>";
        inList = false;
      }
    }

    for (let i = 0; i < lines.length; i++) {
      let line = lines[i].trim();

      if (!line) {
        closeList();
        continue;
      }

      if (/^(D[IÍ]A\s+\d+|SEMANA\s+\d+)$/i.test(line)) {
        closeList();
        html += `<h2>${inlineFormat(line)}</h2>`;
        continue;
      }

      if (/^(OBJETIVO GENERAL|IDEA CENTRAL DE LA SERIE|T[IÍ]TULO GENERAL DE LA SERIE)$/i.test(line)) {
        closeList();
        html += `<h2>${inlineFormat(line)}</h2>`;
        continue;
      }

      if (/^T[IÍ]TULO:\s*/i.test(line)) {
        closeList();
        const contenido = line.replace(/^T[IÍ]TULO:\s*/i, "");
        html += `<h3>${inlineFormat(contenido)}</h3>`;
        continue;
      }

      if (/^(TEXTO B[IÍ]BLICO CLAVE|TEXTO B[IÍ]BLICO BASE|VERDAD CENTRAL|IDEA CENTRAL|OBJETIVO DEL ESTUDIO|OBJETIVO DEL SERM[ÓO]N|OBJETIVO DE LA CLASE|PASAJE BASE):\s*/i.test(line)) {
        closeList();
        const match = line.match(/^([^:]+):\s*(.*)$/);
        const etiqueta = match ? match[1] : "";
        const contenido = match ? match[2] : "";
        html += `<p><strong>${inlineFormat(etiqueta)}:</strong> ${inlineFormat(contenido)}</p>`;
        continue;
      }

      if (/^(REFLEXI[ÓO]N DEVOCIONAL|APLICACI[ÓO]N PERSONAL|APLICACI[ÓO]N PR[ÁA]CTICA|ORACI[ÓO]N FINAL|INTRODUCCI[ÓO]N|CONTEXTO B[IÍ]BLICO|DESARROLLO|DESARROLLO B[IÍ]BLICO|VERDADES PRINCIPALES|PREGUNTAS PARA PROFUNDIZAR|PREGUNTAS PARA EL GRUPO|CIERRE|DESAF[IÍ]O DE LA SEMANA|DIN[ÁA]MICA DE APERTURA)$/i.test(line)) {
        closeList();
        html += `<h3>${inlineFormat(line)}</h3>`;
        continue;
      }

      if (/^\d+\.\s+/.test(line)) {
        if (!inList) {
          html += "<ol>";
          inList = true;
        }
        html += `<li>${inlineFormat(line.replace(/^\d+\.\s+/, ""))}</li>`;
        continue;
      }

      closeList();
      html += `<p>${inlineFormat(line)}</p>`;
    }

    closeList();
    return html;
  }

  function descargarTXT() {
    const contenido = document.getElementById("resultado").value || "";
    if (!contenido.trim()) {
      alert("Primero genera un contenido para poder descargarlo.");
      return;
    }

    const tipoContenido = document.getElementById("tipoContenido").value;
    const modoGeneracion = document.getElementById("modoGeneracion").value;
    const nombreBase = getNombreContenido(tipoContenido).toLowerCase().replace(/\s+/g, "-");
    const prefijo = modoGeneracion === "serie" ? "serie-" : "";
    const tema = (document.getElementById("tema").value || (prefijo + nombreBase))
      .trim()
      .replace(/[^\w\-]+/g, "_");

    const blob = new Blob([contenido], { type:"text/plain;charset=utf-8" });
    const url = URL.createObjectURL(blob);

    const a = document.createElement("a");
    a.href = url;
    a.download = `${tema}.txt`;
    document.body.appendChild(a);
    a.click();
    a.remove();
    URL.revokeObjectURL(url);
  }

    const contenido = document.getElementById("resultado").value || "";

      return;

    const tipoContenido = document.getElementById("tipoContenido").value;
    const modoGeneracion = document.getElementById("modoGeneracion").value;
    const nombreBase = getNombreContenido(tipoContenido).toLowerCase().replace(/\s+/g, "-");
    const prefijo = modoGeneracion === "serie" ? "serie-" : "";
    const tema = (document.getElementById("tema").value || (prefijo + nombreBase))
      .trim()
      .replace(/[^\w\-]+/g, "_");

    const htmlWord = `
      <html xmlns:o="urn:schemas-microsoft-com:office:office"
            xmlns:w="urn:schemas-microsoft-com:office:word"
            xmlns="http://www.w3.org/TR/REC-html40">

        </style>
      </head>
      <body>
        <pre>${escapeHtml(contenido)}</pre>
      </body>
      </html>
    `;

    const blob = new Blob(
      ['\ufeff', htmlWord],
      { type: 'application/msword' }
    );

    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = `${tema}.doc`;
    document.body.appendChild(a);
    a.click();
    a.remove();
    URL.revokeObjectURL(url);
  }

      .replaceAll("&","&amp;")

      .replaceAll("'","&#039;");
  }

  window.addEventListener("beforeinstallprompt", (e) => {
    e.preventDefault();
    deferredPrompt = e;
    document.getElementById("installBtn").classList.remove("hidden");
  });

  window.addEventListener("appinstalled", () => {
    deferredPrompt = null;
    document.getElementById("installBtn").classList.add("hidden");
  });

  if ("serviceWorker" in navigator) {
    window.addEventListener("load", () => {
      navigator.serviceWorker.register("/sw.js").catch((err) => {
        console.error("Error registrando service worker:", err);
      });
    });
  }

  actualizarQuickButtons();
  actualizarContextoLabel();
  actualizarCantidadSerie();
  checkAuth();
</script>
</body>
</html>
